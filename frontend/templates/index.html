<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Procurement Portal · CrewAI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<header class="topbar">
  <div class="topbar-brand">
    <img src="{{ url_for('static', filename='brand/crewai-logo-dark.png') }}" alt="CrewAI" class="logo">
    <span class="brand-rule" aria-hidden="true"></span>
    <span class="wordmark">Procurement&nbsp;<em data-i18n="wordmark_em">Portal</em></span>
  </div>
  <div class="topbar-tools">
    <div class="persona" id="persona">
      <button class="persona-btn" id="persona-btn" aria-haspopup="listbox" aria-expanded="false">
        <span class="avatar" id="persona-avatar"></span>
        <span class="persona-id">
          <span class="persona-name" id="persona-name"></span>
          <span class="persona-role" id="persona-role"></span>
        </span>
        <svg class="chev" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" aria-hidden="true"><path d="m6 9 6 6 6-6"/></svg>
      </button>
      <ul class="persona-menu" id="persona-menu" role="listbox" hidden></ul>
    </div>
    <div class="lang-switch" id="lang-switch" role="group" aria-label="Language">
      <button data-lang="en" class="lang-btn">EN</button>
      <button data-lang="es" class="lang-btn">ES</button>
      <button data-lang="pt" class="lang-btn">PT</button>
    </div>
    <button class="manage-btn" id="manage-btn" aria-label="Manage" data-i18n-title="manage">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z"/>
      </svg>
    </button>
  </div>
</header>

<main class="wrap">
  <section class="board-head">
    <div class="badge-row">
      <span class="pill" aria-hidden="true"></span>
      <span class="badge-label" data-i18n="board_label">LIVE PIPELINE</span>
    </div>
    <h1 class="board-title" id="board-title"></h1>
    <p class="board-sub" data-i18n="subtitle"></p>
  </section>

  <section class="board" id="board" aria-live="polite">
    <div class="col" data-col="processing">
      <header class="col-head">
        <span class="col-dot col-dot-new" aria-hidden="true"></span>
        <h2 class="col-title" data-i18n="col_processing">Processing</h2>
        <span class="col-count mono" id="count-processing">0</span>
      </header>
      <div class="col-body" id="col-processing"></div>
    </div>
    <div class="col" data-col="awaiting">
      <header class="col-head">
        <span class="col-dot col-dot-processing" aria-hidden="true"></span>
        <h2 class="col-title" data-i18n="col_awaiting">Awaiting Quotes</h2>
        <span class="col-count mono" id="count-awaiting">0</span>
      </header>
      <div class="col-body" id="col-awaiting"></div>
    </div>
    <div class="col" data-col="review">
      <header class="col-head">
        <span class="col-dot col-dot-processing" aria-hidden="true"></span>
        <h2 class="col-title" data-i18n="col_review">Quote Review</h2>
        <span class="col-count mono" id="count-review">0</span>
      </header>
      <div class="col-body" id="col-review"></div>
    </div>
    <div class="col" data-col="complete">
      <header class="col-head">
        <span class="col-dot col-dot-done" aria-hidden="true"></span>
        <h2 class="col-title" data-i18n="col_complete">Complete</h2>
        <span class="col-count mono" id="count-complete">0</span>
      </header>
      <div class="col-body" id="col-complete"></div>
    </div>
  </section>
</main>

<div class="drawer-scrim" id="drawer-scrim" hidden></div>
<aside class="drawer" id="drawer" role="dialog" aria-modal="true" aria-labelledby="drawer-pr" hidden>
  <div class="drawer-inner" id="drawer-inner"></div>
</aside>

<div class="drawer-scrim" id="manage-scrim" hidden></div>
<aside class="drawer" id="manage-drawer" role="dialog" aria-modal="true" aria-labelledby="manage-title" hidden>
  <div class="drawer-inner" id="manage-inner"></div>
</aside>

<button class="chat-fab" id="chat-fab" aria-label="Procurement assistant">
  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
    <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
  </svg>
</button>

<section class="chat" id="chat" hidden aria-label="Procurement assistant">
  <header class="chat-head">
    <img src="{{ url_for('static', filename='brand/crewai-logo-white.png') }}" alt="" class="chat-logo">
    <div class="chat-head-text">
      <span class="chat-title" data-i18n="chat_title">Procurement assistant</span>
      <span class="chat-status"><span class="status-dot" aria-hidden="true"></span><span data-i18n="chat_status">online</span></span>
    </div>
    <button class="chat-close" id="chat-close" aria-label="Close chat">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" aria-hidden="true"><path d="M18 6 6 18M6 6l12 12"/></svg>
    </button>
  </header>
  <div class="chat-body" id="chat-body"></div>
  <form class="chat-input" id="chat-form">
    <label class="sr-only" for="chat-text" data-i18n="chat_placeholder">Describe what you need…</label>
    <textarea id="chat-text" rows="1" required></textarea>
    <button type="submit" class="chat-send" aria-label="Send">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
    </button>
  </form>
</section>

<div class="toasts" id="toasts" aria-live="polite"></div>

<script>window.EMPLOYEES = {{ employees | tojson }};</script>
<script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
