compliance_check_task:
  description: >
    Check purchase request {pr_number} against the corporate procurement
    policy, rule by rule.

    Corporate procurement policy:
    {policy}

    Purchase request (JSON):
    {request_json}

    Requesting employee (JSON, includes their personal approval limit):
    {employee_json}

    This employee's other requests in the last 14 days (JSON):
    {recent_requests_json}

    Items mentioned by the requester that could not be matched to the
    catalog: {unmatched}

    Go through: approval matrix, requester limit, order-splitting rule
    (combine with the recent requests), the category rules that apply to
    the requested items, and the conduct rules (business purpose,
    plausible quantities). For each rule state clearly whether it passes
    or fails and why.
  expected_output: >
    A markdown checklist of every applicable policy rule with PASS or
    VIOLATION per rule, evidence for each verdict (numbers, quotes from
    the justification, policy clause), and a closing line stating the
    overall compliance position.
  agent: policy_compliance_officer

anomaly_check_task:
  description: >
    Independently assess purchase request {pr_number} for signs of fraud,
    abuse, or anomaly. Do not repeat the policy checklist — focus on
    whether the request makes business sense.

    Purchase request (JSON):
    {request_json}

    Requesting employee (JSON):
    {employee_json}

    This employee's other requests in the last 14 days (JSON):
    {recent_requests_json}

    Consider: does the quantity fit the stated need and the requester's
    department? Does the justification sound like a real business purpose
    or personal use / gifts? Does the employee's role plausibly need these
    items? Do the recent requests look like one purchase split into
    several? Anything else that would make an experienced investigator
    look twice?
  expected_output: >
    A short markdown assessment: a list of specific anomalies found (each
    with the evidence), or an explicit statement that the request looks
    clean, followed by a one-line risk verdict (CLEAN / SUSPICIOUS /
    HIGHLY SUSPICIOUS).
  agent: fraud_anomaly_analyst

screening_verdict_task:
  description: >
    Combine the compliance checklist and the anomaly assessment above into
    a single screening verdict for purchase request {pr_number}.

    Verdict rules:
    - "reject": a conduct-rule violation (no business purpose, personal
      use/gifts) or clear evidence of fraud/abuse.
    - "flag": policy violations or suspicious anomalies that a human
      reviewer must look at (including requests over the requester's
      personal limit, order-splitting patterns, unmatched items that leave
      the request ambiguous), but the request could be legitimate.
    - "pass": compliant and clean.
  expected_output: >
    A JSON object with fields: 'verdict' (string: pass, flag, or reject),
    'violations' (list of strings, each naming the policy rule broken and
    the evidence), 'anomalies' (list of strings, each a specific suspicious
    pattern with evidence), 'reasoning' (string, 2-4 sentences explaining
    the verdict).
  agent: policy_compliance_officer
