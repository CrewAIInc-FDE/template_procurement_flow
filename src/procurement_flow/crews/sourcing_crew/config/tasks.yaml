cost_analysis_task:
  description: >
    Compare the supplier offers below for purchase request {pr_number}.

    Purchase request with line items (JSON):
    {request_json}

    Supplier offers for the requested items (JSON — unit prices, lead
    times, warranty, payment terms per supplier per item):
    {offers_json}

    For each supplier able to supply the requested items, compute the
    total package cost across all line items at the requested quantities.
    Compare on total cost of ownership: price, warranty coverage, payment
    terms impact on cash flow, and lead time versus the request's urgency.
    Note explicitly if a supplier cannot cover some line items. Rank the
    suppliers from best to worst overall value for this request.
  expected_output: >
    A markdown comparison table (one row per supplier: total package cost,
    lead time, warranty, payment terms, coverage of line items) followed
    by a ranked list with 2-3 sentences per supplier explaining its
    total-cost-of-ownership position.
  agent: cost_analyst

risk_assessment_task:
  description: >
    Assess each supplier offering on purchase request {pr_number}
    (urgency: {urgency}) against the corporate procurement policy and
    their vendor record.

    Corporate procurement policy:
    {policy}

    Supplier records (JSON — history, certifications, performance):
    {suppliers_json}

    Their offers for this request (JSON):
    {offers_json}

    For every supplier, check each applicable sourcing rule
    (certifications for high-criticality items, on-time delivery
    threshold, advance payment limits, minimum warranty) and their track
    record. Flag every violation or risk explicitly, citing the policy
    clause or data point.
  expected_output: >
    A per-supplier risk assessment in markdown. For each supplier: a risk
    rating (LOW / MEDIUM / HIGH), a bullet list of specific policy
    violations or risks with the evidence for each, and a one-line verdict
    on whether the supplier is eligible for award under policy.
  agent: supplier_risk_analyst

recommendation_task:
  description: >
    Using the cost analysis and risk assessment above, select ONE supplier
    to award purchase request {pr_number} and name a runner-up.

    Apply the corporate procurement policy strictly — a supplier flagged
    as ineligible must not be awarded regardless of price. Remember the
    local supplier preference rule when offers are within 5% on total cost
    of ownership, and that urgency can justify paying for shorter lead
    times. State the trade-off you accepted.
  expected_output: >
    A JSON object with fields: 'recommended_supplier' (string, exact
    supplier name), 'total_cost_usd' (number, total package cost of the
    winning offer at requested quantities), 'runner_up' (string),
    'key_risks' (list of strings, residual risks of the chosen supplier),
    'rationale' (string, 3-5 sentences justifying the award),
    'confidence' (string: high, medium, or low).
  agent: procurement_manager
